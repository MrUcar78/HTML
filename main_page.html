</style>

<div style="text-align: center; width: 100%;">
    <div class="countdown-container">
        <div class="countdown-title">🎓 MEZUNİYETE SON</div>
        <div class="countdown-timer">
            <div class="time-unit">
                <span class="time-number" id="days">00</span>
                <span class="time-label">GÜN</span>
            </div>
            <div class="time-unit">
                <span class="time-number" id="hours">00</span>
                <span class="time-label">SAAT</span>
            </div>
            <div class="time-unit">
                <span class="time-number" id="minutes">00</span>
                <span class="time-label">DAKİKA</span>
            </div>
            <div class="time-unit">
                <span class="time-number" id="seconds">00</span>
                <span class="time-label">SANİYE</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Mezuniyet tarihini buraya yaz (Yıl, Ay-1, Gün)
    // Not: Aylar 0'dan başlar (Ocak=0, Haziran=5)
    const mezuniyetTarihi = new Date(2026, 5, 26, 10, 0, 0).getTime();

    const x = setInterval(function() {
        const simdi = new Date().getTime();
        const fark = mezuniyetTarihi - simdi;

        const gun = Math.floor(fark / (1000 * 60 * 60 * 24));
        const saat = Math.floor((fark % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const dakika = Math.floor((fark % (1000 * 60 * 60)) / (1000 * 60));
        const saniye = Math.floor((fark % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = gun;
        document.getElementById("hours").innerHTML = saat;
        document.getElementById("minutes").innerHTML = dakika;
        document.getElementById("seconds").innerHTML = saniye;

        // Tarih geçtiyse
        if (fark < 0) {
            clearInterval(x);
            document.querySelector(".countdown-container").innerHTML = "<h2>MEZUN OLDUK! 🎓</h2>";
        }
    }, 1000);
</script>
